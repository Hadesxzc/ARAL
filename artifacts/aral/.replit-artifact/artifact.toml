kind = "web"
previewPath = "/"
title = "ARAL — Automation Risk Assessment"
version = "1.0.0"
id = "artifacts/aral"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18172

[services.development]
run = "pnpm --filter @workspace/aral run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aral", "run", "build" ]
publicDir = "artifacts/aral/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18172"
BASE_PATH = "/"
