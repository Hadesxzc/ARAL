kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "bash /home/runner/workspace/backend/start.sh"

[services.production]

[services.production.build]
args = ["bash", "-c", "cd /home/runner/workspace/backend && pip install -q -r requirements.txt && python -c 'from model.train import train_and_save; train_and_save()'"]

[services.production.run]
args = ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080", "--app-dir", "/home/runner/workspace/backend"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
